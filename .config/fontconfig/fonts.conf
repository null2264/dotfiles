<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
   <match target="font">
      <edit mode="assign" name="hinting">
         <bool>false</bool>
      </edit>
   </match>
   <match target="pattern">
      <test qual="any" name="family">
         <string>ui-monospace</string>
      </test>
      <edit name="family" mode="assign" binding="same">
         <string>monospace</string>
      </edit>
   </match>
   <alias>
      <family>serif</family>
      <prefer><family>Noto Serif</family></prefer>
   </alias>
   <alias>
      <family>sans-serif</family>
      <prefer><family>Google Sans</family></prefer>
   </alias>
   <alias>
      <family>-apple-system</family>
      <prefer><family>Google Sans</family></prefer>
   </alias>

   <!-- #region: Set Iosevka as monospace font -->
   <!-- REF: https://bbs.archlinux.org/viewtopic.php?pid=2301860#p2301860 -->
   <match target="scan">
      <test name="family" compare="contains">
         <string>Iosevka</string>
      </test>
      <edit name="genericfamily" mode="append">
         <string>monospace</string>
      </edit>
   </match>
   <alias>
      <family>monospace</family>
      <prefer><family>Iosevka</family></prefer>
   </alias>
   <!-- #endregion -->

   <alias>
      <family>Iosevka</family>
      <prefer>
          <family>Iosevka</family>
          <family>Iosevka Nerd Font</family>
          <family>Sarasa Gothic J</family>
      </prefer>
   </alias>

   <!-- #region Disable ligatures for monospace fonts -->
   <match target="pattern">
      <test qual="any" name="family">
         <string>monospace</string>
      </test>
      <edit name="fontfeatures" mode="append">
         <string>liga off</string>
         <string>dlig off</string>
      </edit>
   </match>
   <!-- #endregion -->
</fontconfig>
